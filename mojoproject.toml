[workspace]
authors = ["Vilson Vieira <vilson@void.cc>"]
channels = ["conda-forge", "https://conda.modular.com/max-nightly/"]
name = "modex"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = "mojo run -I libs src/main.mojo"
build = "mojo build -I libs src/main.mojo -o modex"
test = "mojo test -I libs tests/"

[dependencies]
max = "*"
requests = ">=2.32.5,<3"
